version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bhsis-postgres
    environment:
      POSTGRES_USER: bhsis
      POSTGRES_PASSWORD: bhsis_password
      POSTGRES_DB: bhsis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhsis"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bhsis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bhsis-backend
    environment:
      DATABASE_URL: postgresql://bhsis:bhsis_password@postgres:5432/bhsis
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: dev-secret-key-change-in-production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm start

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: bhsis-network
